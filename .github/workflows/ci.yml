name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  test:
    name: test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Assemble package
        # Generates VoiceCorpusBuilder/voice_corpus_tool.py (not committed) so the
        # launcher + drift-guard tests have the shipped copy to check against.
        run: ./package.sh

      - name: Compile check
        run: python -m py_compile voice_corpus_tool.py

      - name: Unit tests
        run: python -m unittest discover -s tests -v

      - name: Launcher integration test
        run: bash tests/test_launcher.sh
